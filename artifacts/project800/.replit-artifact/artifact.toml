kind = "web"
previewPath = "/"
title = "Project 800 — Tatva Global School"
version = "1.0.0"
id = "artifacts/project800"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22802

[services.development]
run = "pnpm --filter @workspace/project800 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/project800", "run", "build" ]
publicDir = "artifacts/project800/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22802"
BASE_PATH = "/"
